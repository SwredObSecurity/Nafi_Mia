<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0c0c1a"/>
  <rect x="40" y="30" width="720" height="340" rx="12" fill="#12122a" stroke="#38bdf8" stroke-width="1"/>
  <!-- Code editor look -->
  <rect x="40" y="30" width="200" height="340" rx="12" fill="#0e0e20"/>
  <text x="60" y="65" font-family="monospace" font-size="11" fill="#0284c7">Explorer</text>
  <text x="60" y="95" font-family="monospace" font-size="10" fill="#7dd3fc">BookI - Basics</text>
  <text x="60" y="115" font-family="monospace" font-size="10" fill="#38bdf8">BookII - OOP</text>
  <text x="60" y="135" font-family="monospace" font-size="10" fill="#7dd3fc">BookIII - Pointers</text>
  <text x="60" y="155" font-family="monospace" font-size="10" fill="#38bdf8">BookIV - Advanced</text>
  <text x="60" y="175" font-family="monospace" font-size="10" fill="#7dd3fc">BookV - IO</text>
  <text x="60" y="195" font-family="monospace" font-size="10" fill="#38bdf8">BookVI - Templates</text>
  <text x="60" y="215" font-family="monospace" font-size="10" fill="#7dd3fc">BookVII - STL</text>
  <!-- Code area -->
  <text x="265" y="65" font-family="monospace" font-size="10" fill="#475569">1</text>
  <text x="290" y="65" font-family="monospace" font-size="11" fill="#38bdf8">#include</text>
  <text x="370" y="65" font-family="monospace" font-size="11" fill="#a3e635">&lt;iostream&gt;</text>
  <text x="265" y="85" font-family="monospace" font-size="10" fill="#475569">2</text>
  <text x="290" y="85" font-family="monospace" font-size="11" fill="#38bdf8">#include</text>
  <text x="370" y="85" font-family="monospace" font-size="11" fill="#a3e635">&lt;vector&gt;</text>
  <text x="265" y="105" font-family="monospace" font-size="10" fill="#475569">3</text>
  <text x="265" y="125" font-family="monospace" font-size="10" fill="#475569">4</text>
  <text x="290" y="125" font-family="monospace" font-size="11" fill="#38bdf8">using namespace</text>
  <text x="420" y="125" font-family="monospace" font-size="11" fill="#e2e8f0">std;</text>
  <text x="265" y="155" font-family="monospace" font-size="10" fill="#475569">5</text>
  <text x="290" y="155" font-family="monospace" font-size="11" fill="#c084fc">int</text>
  <text x="320" y="155" font-family="monospace" font-size="11" fill="#22d3ee">main</text>
  <text x="360" y="155" font-family="monospace" font-size="11" fill="#e2e8f0">() {</text>
  <text x="265" y="175" font-family="monospace" font-size="10" fill="#475569">6</text>
  <text x="310" y="175" font-family="monospace" font-size="11" fill="#e2e8f0">cout &lt;&lt;</text>
  <text x="385" y="175" font-family="monospace" font-size="11" fill="#a3e635">"C++ AIO"</text>
  <text x="265" y="195" font-family="monospace" font-size="10" fill="#475569">7</text>
  <text x="310" y="195" font-family="monospace" font-size="11" fill="#e2e8f0">&lt;&lt; endl;</text>
  <text x="265" y="215" font-family="monospace" font-size="10" fill="#475569">8</text>
  <text x="310" y="215" font-family="monospace" font-size="11" fill="#c084fc">return</text>
  <text x="375" y="215" font-family="monospace" font-size="11" fill="#f59e0b">0</text>
  <text x="390" y="215" font-family="monospace" font-size="11" fill="#e2e8f0">;</text>
  <text x="265" y="235" font-family="monospace" font-size="10" fill="#475569">9</text>
  <text x="290" y="235" font-family="monospace" font-size="11" fill="#e2e8f0">}</text>
  <!-- Badge -->
  <rect x="560" y="320" width="170" height="30" rx="6" fill="#0284c7"/>
  <text x="580" y="340" font-family="monospace" font-size="12" fill="white">C++ All-in-One 4e</text>
</svg>