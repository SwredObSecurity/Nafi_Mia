<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#1a0a0a"/>
  <!-- Calculator body -->
  <rect x="250" y="20" width="300" height="360" rx="16" fill="#2d1b1b" stroke="#ef4444" stroke-width="1"/>
  <!-- Display -->
  <rect x="275" y="40" width="250" height="70" rx="10" fill="#0f0808" stroke="#7f1d1d" stroke-width="1"/>
  <text x="490" y="72" font-family="monospace" font-size="12" fill="#6b7280" text-anchor="end">128 + 56</text>
  <text x="490" y="98" font-family="monospace" font-size="24" fill="#fca5a5" text-anchor="end">184</text>
  <!-- Row 1: C, +/-, %, / -->
  <rect x="275" y="125" width="55" height="45" rx="8" fill="#991b1b"/>
  <text x="295" y="153" font-family="monospace" font-size="16" fill="#fecaca">C</text>
  <rect x="340" y="125" width="55" height="45" rx="8" fill="#451a1a"/>
  <text x="356" y="153" font-family="monospace" font-size="16" fill="#fca5a5">+/-</text>
  <rect x="405" y="125" width="55" height="45" rx="8" fill="#451a1a"/>
  <text x="426" y="153" font-family="monospace" font-size="16" fill="#fca5a5">%</text>
  <rect x="470" y="125" width="55" height="45" rx="8" fill="#dc2626"/>
  <text x="492" y="153" font-family="monospace" font-size="16" fill="white">/</text>
  <!-- Row 2: 7, 8, 9, x -->
  <rect x="275" y="180" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="296" y="208" font-family="monospace" font-size="16" fill="#e2e8f0">7</text>
  <rect x="340" y="180" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="361" y="208" font-family="monospace" font-size="16" fill="#e2e8f0">8</text>
  <rect x="405" y="180" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="426" y="208" font-family="monospace" font-size="16" fill="#e2e8f0">9</text>
  <rect x="470" y="180" width="55" height="45" rx="8" fill="#dc2626"/>
  <text x="491" y="208" font-family="monospace" font-size="16" fill="white">x</text>
  <!-- Row 3: 4, 5, 6, - -->
  <rect x="275" y="235" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="296" y="263" font-family="monospace" font-size="16" fill="#e2e8f0">4</text>
  <rect x="340" y="235" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="361" y="263" font-family="monospace" font-size="16" fill="#e2e8f0">5</text>
  <rect x="405" y="235" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="426" y="263" font-family="monospace" font-size="16" fill="#e2e8f0">6</text>
  <rect x="470" y="235" width="55" height="45" rx="8" fill="#dc2626"/>
  <text x="492" y="263" font-family="monospace" font-size="16" fill="white">-</text>
  <!-- Row 4: 1, 2, 3, + -->
  <rect x="275" y="290" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="296" y="318" font-family="monospace" font-size="16" fill="#e2e8f0">1</text>
  <rect x="340" y="290" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="361" y="318" font-family="monospace" font-size="16" fill="#e2e8f0">2</text>
  <rect x="405" y="290" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="426" y="318" font-family="monospace" font-size="16" fill="#e2e8f0">3</text>
  <rect x="470" y="290" width="55" height="45" rx="8" fill="#dc2626"/>
  <text x="491" y="318" font-family="monospace" font-size="16" fill="white">+</text>
  <!-- Row 5: 0, ., = -->
  <rect x="275" y="345" width="120" height="45" rx="8" fill="#1f1212"/>
  <text x="328" y="373" font-family="monospace" font-size="16" fill="#e2e8f0">0</text>
  <rect x="405" y="345" width="55" height="45" rx="8" fill="#1f1212"/>
  <text x="428" y="373" font-family="monospace" font-size="16" fill="#e2e8f0">.</text>
  <rect x="470" y="345" width="55" height="45" rx="8" fill="#ef4444"/>
  <text x="491" y="373" font-family="monospace" font-size="16" fill="white">=</text>
</svg>
