<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0f172a"/>
  <!-- Sidebar -->
  <rect x="30" y="25" width="170" height="350" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
  <rect x="42" y="40" width="146" height="32" rx="8" fill="#0ea5e9"/>
  <text x="62" y="61" font-family="monospace" font-size="11" fill="white">+ Compose</text>
  <text x="50" y="98" font-family="monospace" font-size="10" fill="#7dd3fc">Inbox (3)</text>
  <rect x="42" y="84" width="146" height="22" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="50" y="120" font-family="monospace" font-size="10" fill="#94a3b8">Sent</text>
  <text x="50" y="142" font-family="monospace" font-size="10" fill="#94a3b8">Drafts (1)</text>
  <text x="50" y="164" font-family="monospace" font-size="10" fill="#94a3b8">Spam</text>
  <text x="50" y="186" font-family="monospace" font-size="10" fill="#94a3b8">Trash</text>
  <line x1="50" y1="200" x2="180" y2="200" stroke="#334155" stroke-width="1"/>
  <text x="50" y="222" font-family="monospace" font-size="9" fill="#64748b">Labels</text>
  <rect x="50" y="232" width="10" height="10" rx="2" fill="#22c55e"/>
  <text x="66" y="241" font-family="monospace" font-size="9" fill="#94a3b8">Work</text>
  <rect x="50" y="252" width="10" height="10" rx="2" fill="#eab308"/>
  <text x="66" y="261" font-family="monospace" font-size="9" fill="#94a3b8">Personal</text>
  <rect x="50" y="272" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="66" y="281" font-family="monospace" font-size="9" fill="#94a3b8">Important</text>
  <!-- Compose window -->
  <rect x="220" y="25" width="550" height="350" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
  <rect x="220" y="25" width="550" height="40" rx="12" fill="#0c4a6e"/>
  <rect x="220" y="50" width="550" height="15" fill="#0c4a6e"/>
  <text x="240" y="51" font-family="monospace" font-size="13" fill="#7dd3fc" font-weight="bold">New Message</text>
  <text x="720" y="51" font-family="monospace" font-size="14" fill="#94a3b8">x</text>
  <!-- Form fields -->
  <line x1="240" y1="82" x2="750" y2="82" stroke="#334155" stroke-width="1"/>
  <text x="240" y="100" font-family="monospace" font-size="11" fill="#64748b">To:</text>
  <text x="280" y="100" font-family="monospace" font-size="11" fill="#e2e8f0">john.doe@email.com</text>
  <line x1="240" y1="112" x2="750" y2="112" stroke="#334155" stroke-width="1"/>
  <text x="240" y="130" font-family="monospace" font-size="11" fill="#64748b">Cc:</text>
  <text x="280" y="130" font-family="monospace" font-size="11" fill="#94a3b8">team@company.com</text>
  <line x1="240" y1="142" x2="750" y2="142" stroke="#334155" stroke-width="1"/>
  <text x="240" y="160" font-family="monospace" font-size="11" fill="#64748b">Subject:</text>
  <text x="310" y="160" font-family="monospace" font-size="11" fill="#e2e8f0">Project Update - Q1 Report</text>
  <line x1="240" y1="172" x2="750" y2="172" stroke="#334155" stroke-width="1"/>
  <!-- Email body -->
  <text x="240" y="198" font-family="monospace" font-size="11" fill="#cbd5e1">Hi John,</text>
  <text x="240" y="220" font-family="monospace" font-size="11" fill="#cbd5e1">Please find the Q1 report</text>
  <text x="240" y="238" font-family="monospace" font-size="11" fill="#cbd5e1">attached. Key highlights:</text>
  <text x="240" y="262" font-family="monospace" font-size="11" fill="#94a3b8">- Revenue up 15%</text>
  <text x="240" y="280" font-family="monospace" font-size="11" fill="#94a3b8">- 3 new clients onboarded</text>
  <text x="240" y="298" font-family="monospace" font-size="11" fill="#94a3b8">- Project ahead of schedule</text>
  <text x="240" y="322" font-family="monospace" font-size="11" fill="#cbd5e1">Best regards</text>
  <!-- Bottom toolbar -->
  <rect x="240" y="340" width="80" height="30" rx="6" fill="#0ea5e9"/>
  <text x="261" y="360" font-family="monospace" font-size="11" fill="white">Send</text>
  <rect x="335" y="340" width="90" height="30" rx="6" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1"/>
  <text x="350" y="360" font-family="monospace" font-size="10" fill="#7dd3fc">Attach</text>
  <rect x="440" y="340" width="90" height="30" rx="6" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1"/>
  <text x="452" y="360" font-family="monospace" font-size="10" fill="#7dd3fc">Discard</text>
</svg>
