<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0a1a0a"/>
  <!-- Title -->
  <text x="300" y="35" font-family="monospace" font-size="16" fill="#4ade80" font-weight="bold">File Sorter Utility</text>
  <!-- Unsorted files (left) -->
  <rect x="40" y="55" width="230" height="310" rx="12" fill="#162416" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="80" font-family="monospace" font-size="12" fill="#4ade80">Unsorted Files</text>
  <line x1="55" y1="90" x2="255" y2="90" stroke="#2d4a2d" stroke-width="1"/>
  <rect x="55" y="100" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="119" font-family="monospace" font-size="10" fill="#86efac">report.pdf</text>
  <rect x="55" y="135" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="154" font-family="monospace" font-size="10" fill="#86efac">photo.jpg</text>
  <rect x="55" y="170" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="189" font-family="monospace" font-size="10" fill="#86efac">notes.txt</text>
  <rect x="55" y="205" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="224" font-family="monospace" font-size="10" fill="#86efac">video.mp4</text>
  <rect x="55" y="240" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="259" font-family="monospace" font-size="10" fill="#86efac">app.exe</text>
  <rect x="55" y="275" width="200" height="28" rx="5" fill="#0d1a0d"/>
  <text x="65" y="294" font-family="monospace" font-size="10" fill="#86efac">data.csv</text>
  <rect x="80" y="318" width="150" height="32" rx="8" fill="#16a34a"/>
  <text x="112" y="339" font-family="monospace" font-size="11" fill="white">Sort Files</text>
  <!-- Arrows -->
  <line x1="290" y1="140" x2="340" y2="100" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="180" x2="340" y2="180" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="220" x2="340" y2="260" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="260" x2="340" y2="340" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="295" y="195" font-family="monospace" font-size="20" fill="#4ade80">--></text>
  <!-- Sorted folders (right) -->
  <!-- Documents -->
  <rect x="370" y="55" width="190" height="85" rx="10" fill="#162416" stroke="#16a34a" stroke-width="1"/>
  <rect x="380" y="62" width="60" height="18" rx="4" fill="#16a34a"/>
  <text x="386" y="76" font-family="monospace" font-size="9" fill="white">Docs</text>
  <text x="385" y="100" font-family="monospace" font-size="9" fill="#86efac">report.pdf</text>
  <text x="385" y="116" font-family="monospace" font-size="9" fill="#86efac">notes.txt</text>
  <text x="385" y="132" font-family="monospace" font-size="9" fill="#86efac">data.csv</text>
  <!-- Images -->
  <rect x="580" y="55" width="190" height="70" rx="10" fill="#162416" stroke="#16a34a" stroke-width="1"/>
  <rect x="590" y="62" width="60" height="18" rx="4" fill="#0ea5e9"/>
  <text x="593" y="76" font-family="monospace" font-size="9" fill="white">Images</text>
  <text x="595" y="100" font-family="monospace" font-size="9" fill="#86efac">photo.jpg</text>
  <text x="595" y="116" font-family="monospace" font-size="9" fill="#6b7280">1 file</text>
  <!-- Media -->
  <rect x="370" y="155" width="190" height="70" rx="10" fill="#162416" stroke="#16a34a" stroke-width="1"/>
  <rect x="380" y="162" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="386" y="176" font-family="monospace" font-size="9" fill="white">Media</text>
  <text x="385" y="200" font-family="monospace" font-size="9" fill="#86efac">video.mp4</text>
  <text x="385" y="216" font-family="monospace" font-size="9" fill="#6b7280">1 file</text>
  <!-- Programs -->
  <rect x="580" y="155" width="190" height="70" rx="10" fill="#162416" stroke="#16a34a" stroke-width="1"/>
  <rect x="590" y="162" width="70" height="18" rx="4" fill="#ef4444"/>
  <text x="593" y="176" font-family="monospace" font-size="9" fill="white">Programs</text>
  <text x="595" y="200" font-family="monospace" font-size="9" fill="#86efac">app.exe</text>
  <text x="595" y="216" font-family="monospace" font-size="9" fill="#6b7280">1 file</text>
  <!-- Summary -->
  <rect x="370" y="250" width="400" height="110" rx="10" fill="#162416" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="278" font-family="monospace" font-size="12" fill="#4ade80">Sort Summary</text>
  <line x1="390" y1="288" x2="750" y2="288" stroke="#2d4a2d" stroke-width="1"/>
  <text x="390" y="310" font-family="monospace" font-size="10" fill="#86efac">Total files:    6</text>
  <text x="390" y="328" font-family="monospace" font-size="10" fill="#86efac">Categories:     4</text>
  <text x="390" y="346" font-family="monospace" font-size="10" fill="#86efac">Status:         Complete</text>
  <circle cx="627" cy="342" r="5" fill="#22c55e"/>
</svg>
