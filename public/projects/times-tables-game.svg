<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0a1e1e"/>
  <!-- Title -->
  <text x="230" y="38" font-family="monospace" font-size="18" fill="#2dd4bf" font-weight="bold">Times Tables Game</text>
  <!-- Score and stats bar -->
  <rect x="40" y="50" width="720" height="40" rx="8" fill="#153030" stroke="#14b8a6" stroke-width="1"/>
  <text x="60" y="75" font-family="monospace" font-size="11" fill="#5eead4">Score: 85</text>
  <text x="200" y="75" font-family="monospace" font-size="11" fill="#5eead4">Streak: 4</text>
  <text x="340" y="75" font-family="monospace" font-size="11" fill="#5eead4">Level: 3</text>
  <text x="470" y="75" font-family="monospace" font-size="11" fill="#5eead4">Time: 01:23</text>
  <!-- Progress bar -->
  <rect x="610" y="63" width="130" height="14" rx="7" fill="#0d1f1f" stroke="#115e59" stroke-width="1"/>
  <rect x="611" y="64" width="85" height="12" rx="6" fill="#14b8a6"/>
  <text x="650" y="74" font-family="monospace" font-size="7" fill="white">7/10</text>
  <!-- Current question - big and centered -->
  <rect x="150" y="108" width="500" height="100" rx="14" fill="#153030" stroke="#0d9488" stroke-width="2"/>
  <text x="275" y="145" font-family="monospace" font-size="10" fill="#5eead4">Question 8 of 10</text>
  <text x="270" y="185" font-family="monospace" font-size="36" fill="#f0fdfa" font-weight="bold">8  x  7  = ?</text>
  <!-- Answer options -->
  <rect x="100" y="225" width="140" height="50" rx="10" fill="#153030" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="148" y="256" font-family="monospace" font-size="18" fill="#ccfbf1" text-anchor="middle">54</text>
  <rect x="260" y="225" width="140" height="50" rx="10" fill="#14b8a6" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="308" y="256" font-family="monospace" font-size="18" fill="white" text-anchor="middle">56</text>
  <rect x="420" y="225" width="140" height="50" rx="10" fill="#153030" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="468" y="256" font-family="monospace" font-size="18" fill="#ccfbf1" text-anchor="middle">48</text>
  <rect x="580" y="225" width="140" height="50" rx="10" fill="#153030" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="628" y="256" font-family="monospace" font-size="18" fill="#ccfbf1" text-anchor="middle">63</text>
  <!-- Previous answers -->
  <rect x="40" y="295" width="720" height="85" rx="10" fill="#0d1f1f" stroke="#115e59" stroke-width="1"/>
  <text x="60" y="318" font-family="monospace" font-size="11" fill="#2dd4bf" font-weight="bold">Recent Answers</text>
  <line x1="60" y1="326" x2="740" y2="326" stroke="#1a3a3a" stroke-width="1"/>
  <text x="60" y="346" font-family="monospace" font-size="10" fill="#22c55e">Q5: 6 x 9 = 54</text>
  <text x="200" y="346" font-family="monospace" font-size="10" fill="#22c55e">&#x2713;</text>
  <text x="60" y="366" font-family="monospace" font-size="10" fill="#22c55e">Q6: 3 x 8 = 24</text>
  <text x="200" y="366" font-family="monospace" font-size="10" fill="#22c55e">&#x2713;</text>
  <text x="250" y="346" font-family="monospace" font-size="10" fill="#ef4444">Q7: 7 x 4 = 24</text>
  <text x="415" y="346" font-family="monospace" font-size="10" fill="#ef4444">&#x2717;</text>
  <text x="430" y="346" font-family="monospace" font-size="10" fill="#ef4444" text-decoration="line-through">24</text>
  <text x="460" y="346" font-family="monospace" font-size="10" fill="#6b7280">--> 28</text>
  <text x="250" y="366" font-family="monospace" font-size="10" fill="#22c55e">Q4: 5 x 5 = 25</text>
  <text x="415" y="366" font-family="monospace" font-size="10" fill="#22c55e">&#x2713;</text>
  <!-- Table selector at bottom -->
  <text x="530" y="318" font-family="monospace" font-size="9" fill="#5eead4">Practicing:</text>
  <rect x="610" y="305" width="30" height="20" rx="4" fill="#14b8a6" opacity="0.3"/>
  <text x="619" y="319" font-family="monospace" font-size="10" fill="#2dd4bf">6</text>
  <rect x="648" y="305" width="30" height="20" rx="4" fill="#14b8a6" opacity="0.3"/>
  <text x="657" y="319" font-family="monospace" font-size="10" fill="#2dd4bf">7</text>
  <rect x="686" y="305" width="30" height="20" rx="4" fill="#14b8a6" opacity="0.3"/>
  <text x="695" y="319" font-family="monospace" font-size="10" fill="#2dd4bf">8</text>
</svg>
