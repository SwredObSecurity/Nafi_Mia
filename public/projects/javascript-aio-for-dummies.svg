<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0c0c1a"/>
  <rect x="40" y="30" width="720" height="340" rx="12" fill="#12122a" stroke="#eab308" stroke-width="1"/>
  <!-- Code editor look -->
  <rect x="40" y="30" width="200" height="340" rx="12" fill="#0e0e20"/>
  <text x="60" y="65" font-family="monospace" font-size="11" fill="#ca8a04">Explorer</text>
  <text x="60" y="95" font-family="monospace" font-size="10" fill="#fde047">Variables &amp; Types</text>
  <text x="60" y="115" font-family="monospace" font-size="10" fill="#eab308">Functions</text>
  <text x="60" y="135" font-family="monospace" font-size="10" fill="#fde047">DOM Manipulation</text>
  <text x="60" y="155" font-family="monospace" font-size="10" fill="#eab308">Events</text>
  <text x="60" y="175" font-family="monospace" font-size="10" fill="#fde047">Async / Promises</text>
  <text x="60" y="195" font-family="monospace" font-size="10" fill="#eab308">Node.js</text>
  <text x="60" y="215" font-family="monospace" font-size="10" fill="#fde047">React Basics</text>
  <!-- Code area -->
  <text x="265" y="65" font-family="monospace" font-size="10" fill="#475569">1</text>
  <text x="290" y="65" font-family="monospace" font-size="11" fill="#eab308">const</text>
  <text x="335" y="65" font-family="monospace" font-size="11" fill="#e2e8f0">greet =</text>
  <text x="400" y="65" font-family="monospace" font-size="11" fill="#c084fc">(name)</text>
  <text x="460" y="65" font-family="monospace" font-size="11" fill="#e2e8f0">=&gt; {</text>
  <text x="265" y="85" font-family="monospace" font-size="10" fill="#475569">2</text>
  <text x="310" y="85" font-family="monospace" font-size="11" fill="#c084fc">return</text>
  <text x="370" y="85" font-family="monospace" font-size="11" fill="#a3e635">`Hello ${</text>
  <text x="450" y="85" font-family="monospace" font-size="11" fill="#e2e8f0">name</text>
  <text x="490" y="85" font-family="monospace" font-size="11" fill="#a3e635">}`</text>
  <text x="505" y="85" font-family="monospace" font-size="11" fill="#e2e8f0">;</text>
  <text x="265" y="105" font-family="monospace" font-size="10" fill="#475569">3</text>
  <text x="290" y="105" font-family="monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="265" y="135" font-family="monospace" font-size="10" fill="#475569">4</text>
  <text x="290" y="135" font-family="monospace" font-size="11" fill="#eab308">async function</text>
  <text x="420" y="135" font-family="monospace" font-size="11" fill="#22d3ee">fetchData</text>
  <text x="510" y="135" font-family="monospace" font-size="11" fill="#e2e8f0">() {</text>
  <text x="265" y="155" font-family="monospace" font-size="10" fill="#475569">5</text>
  <text x="310" y="155" font-family="monospace" font-size="11" fill="#eab308">const</text>
  <text x="355" y="155" font-family="monospace" font-size="11" fill="#e2e8f0">res =</text>
  <text x="400" y="155" font-family="monospace" font-size="11" fill="#c084fc">await</text>
  <text x="450" y="155" font-family="monospace" font-size="11" fill="#22d3ee">fetch</text>
  <text x="495" y="155" font-family="monospace" font-size="11" fill="#e2e8f0">(url);</text>
  <text x="265" y="175" font-family="monospace" font-size="10" fill="#475569">6</text>
  <text x="310" y="175" font-family="monospace" font-size="11" fill="#eab308">const</text>
  <text x="355" y="175" font-family="monospace" font-size="11" fill="#e2e8f0">data =</text>
  <text x="405" y="175" font-family="monospace" font-size="11" fill="#c084fc">await</text>
  <text x="450" y="175" font-family="monospace" font-size="11" fill="#e2e8f0">res.json();</text>
  <text x="265" y="195" font-family="monospace" font-size="10" fill="#475569">7</text>
  <text x="310" y="195" font-family="monospace" font-size="11" fill="#c084fc">return</text>
  <text x="370" y="195" font-family="monospace" font-size="11" fill="#e2e8f0">data;</text>
  <text x="265" y="215" font-family="monospace" font-size="10" fill="#475569">8</text>
  <text x="290" y="215" font-family="monospace" font-size="11" fill="#e2e8f0">}</text>
  <!-- Badge -->
  <rect x="540" y="320" width="190" height="30" rx="6" fill="#ca8a04"/>
  <text x="555" y="340" font-family="monospace" font-size="12" fill="white">JavaScript All-in-One</text>
</svg>