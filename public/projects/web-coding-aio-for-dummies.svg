<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0c0c1a"/>
  <rect x="40" y="30" width="720" height="340" rx="12" fill="#12122a" stroke="#f97316" stroke-width="1"/>
  <!-- Code editor look -->
  <rect x="40" y="30" width="200" height="340" rx="12" fill="#0e0e20"/>
  <text x="60" y="65" font-family="monospace" font-size="11" fill="#ea580c">Explorer</text>
  <text x="60" y="95" font-family="monospace" font-size="10" fill="#fdba74">bk01 - HTML</text>
  <text x="60" y="115" font-family="monospace" font-size="10" fill="#f97316">bk02 - CSS</text>
  <text x="60" y="135" font-family="monospace" font-size="10" fill="#fdba74">bk03 - JavaScript</text>
  <text x="60" y="155" font-family="monospace" font-size="10" fill="#f97316">bk04 - jQuery</text>
  <text x="60" y="175" font-family="monospace" font-size="10" fill="#fdba74">bk05 - PHP &amp; MySQL</text>
  <text x="60" y="195" font-family="monospace" font-size="10" fill="#f97316">bk06 - APIs</text>
  <text x="60" y="215" font-family="monospace" font-size="10" fill="#fdba74">bk07 - Deployment</text>
  <text x="60" y="250" font-family="monospace" font-size="9" fill="#475569">30+ chapters</text>
  <!-- Code area -->
  <text x="265" y="65" font-family="monospace" font-size="10" fill="#475569">1</text>
  <text x="290" y="65" font-family="monospace" font-size="11" fill="#f97316">&lt;!DOCTYPE html&gt;</text>
  <text x="265" y="85" font-family="monospace" font-size="10" fill="#475569">2</text>
  <text x="290" y="85" font-family="monospace" font-size="11" fill="#f97316">&lt;html&gt;</text>
  <text x="265" y="105" font-family="monospace" font-size="10" fill="#475569">3</text>
  <text x="310" y="105" font-family="monospace" font-size="11" fill="#f97316">&lt;head&gt;</text>
  <text x="265" y="125" font-family="monospace" font-size="10" fill="#475569">4</text>
  <text x="330" y="125" font-family="monospace" font-size="11" fill="#38bdf8">&lt;style&gt;</text>
  <text x="265" y="145" font-family="monospace" font-size="10" fill="#475569">5</text>
  <text x="350" y="145" font-family="monospace" font-size="11" fill="#a3e635">.app</text>
  <text x="390" y="145" font-family="monospace" font-size="11" fill="#e2e8f0">{ display: flex; }</text>
  <text x="265" y="165" font-family="monospace" font-size="10" fill="#475569">6</text>
  <text x="330" y="165" font-family="monospace" font-size="11" fill="#38bdf8">&lt;/style&gt;</text>
  <text x="265" y="185" font-family="monospace" font-size="10" fill="#475569">7</text>
  <text x="310" y="185" font-family="monospace" font-size="11" fill="#f97316">&lt;/head&gt;</text>
  <text x="265" y="205" font-family="monospace" font-size="10" fill="#475569">8</text>
  <text x="310" y="205" font-family="monospace" font-size="11" fill="#f97316">&lt;body&gt;</text>
  <text x="265" y="225" font-family="monospace" font-size="10" fill="#475569">9</text>
  <text x="330" y="225" font-family="monospace" font-size="11" fill="#c084fc">&lt;script&gt;</text>
  <text x="265" y="245" font-family="monospace" font-size="10" fill="#475569">10</text>
  <text x="350" y="245" font-family="monospace" font-size="11" fill="#e2e8f0">console.log(</text>
  <text x="460" y="245" font-family="monospace" font-size="11" fill="#a3e635">"Web AIO"</text>
  <text x="540" y="245" font-family="monospace" font-size="11" fill="#e2e8f0">);</text>
  <!-- Badge -->
  <rect x="530" y="320" width="200" height="30" rx="6" fill="#ea580c"/>
  <text x="545" y="340" font-family="monospace" font-size="12" fill="white">Web Dev All-in-One</text>
</svg>