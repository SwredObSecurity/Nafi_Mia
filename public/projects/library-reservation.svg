<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#150f0a"/>
  <!-- Title bar -->
  <rect x="30" y="20" width="740" height="45" rx="10" fill="#2a1f14" stroke="#d97706" stroke-width="1"/>
  <text x="270" y="48" font-family="monospace" font-size="15" fill="#fbbf24" font-weight="bold">Library Catalog</text>
  <!-- Search -->
  <rect x="50" y="30" width="180" height="26" rx="6" fill="#1a1208" stroke="#92400e" stroke-width="1"/>
  <text x="62" y="48" font-family="monospace" font-size="9" fill="#78716c">Search books...</text>
  <!-- Book cards -->
  <rect x="30" y="80" width="230" height="140" rx="10" fill="#2a1f14" stroke="#b45309" stroke-width="1"/>
  <rect x="42" y="92" width="50" height="68" rx="4" fill="#92400e"/>
  <text x="52" y="120" font-family="monospace" font-size="8" fill="#fef3c7">The</text>
  <text x="48" y="132" font-family="monospace" font-size="8" fill="#fef3c7">Great</text>
  <text x="46" y="144" font-family="monospace" font-size="7" fill="#fef3c7">Gatsby</text>
  <text x="105" y="108" font-family="monospace" font-size="10" fill="#fde68a">The Great Gatsby</text>
  <text x="105" y="124" font-family="monospace" font-size="9" fill="#a8a29e">F. Scott Fitzgerald</text>
  <text x="105" y="142" font-family="monospace" font-size="8" fill="#78716c">ISBN: 978-0743273565</text>
  <rect x="105" y="150" width="60" height="16" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="111" y="162" font-family="monospace" font-size="8" fill="#22c55e">Available</text>
  <rect x="42" y="180" width="200" height="26" rx="6" fill="#d97706"/>
  <text x="95" y="197" font-family="monospace" font-size="10" fill="white">Reserve</text>

  <rect x="285" y="80" width="230" height="140" rx="10" fill="#2a1f14" stroke="#b45309" stroke-width="1"/>
  <rect x="297" y="92" width="50" height="68" rx="4" fill="#1e40af"/>
  <text x="311" y="120" font-family="monospace" font-size="8" fill="#dbeafe">To</text>
  <text x="305" y="132" font-family="monospace" font-size="8" fill="#dbeafe">Kill</text>
  <text x="311" y="144" font-family="monospace" font-size="7" fill="#dbeafe">a M</text>
  <text x="360" y="108" font-family="monospace" font-size="10" fill="#fde68a">To Kill a</text>
  <text x="360" y="122" font-family="monospace" font-size="10" fill="#fde68a">Mockingbird</text>
  <text x="360" y="138" font-family="monospace" font-size="9" fill="#a8a29e">Harper Lee</text>
  <text x="360" y="154" font-family="monospace" font-size="8" fill="#78716c">ISBN: 978-0061120084</text>
  <rect x="360" y="162" width="70" height="16" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="366" y="174" font-family="monospace" font-size="8" fill="#ef4444">Checked Out</text>
  <rect x="297" y="180" width="200" height="26" rx="6" fill="#44403c"/>
  <text x="339" y="197" font-family="monospace" font-size="10" fill="#a8a29e">Unavailable</text>

  <rect x="540" y="80" width="230" height="140" rx="10" fill="#2a1f14" stroke="#b45309" stroke-width="1"/>
  <rect x="552" y="92" width="50" height="68" rx="4" fill="#166534"/>
  <text x="566" y="118" font-family="monospace" font-size="8" fill="#dcfce7">19</text>
  <text x="564" y="130" font-family="monospace" font-size="8" fill="#dcfce7">84</text>
  <text x="615" y="108" font-family="monospace" font-size="10" fill="#fde68a">1984</text>
  <text x="615" y="124" font-family="monospace" font-size="9" fill="#a8a29e">George Orwell</text>
  <text x="615" y="142" font-family="monospace" font-size="8" fill="#78716c">ISBN: 978-0451524935</text>
  <rect x="615" y="150" width="60" height="16" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="621" y="162" font-family="monospace" font-size="8" fill="#22c55e">Available</text>
  <rect x="552" y="180" width="200" height="26" rx="6" fill="#d97706"/>
  <text x="605" y="197" font-family="monospace" font-size="10" fill="white">Reserve</text>

  <!-- Reservation summary -->
  <rect x="30" y="240" width="740" height="135" rx="10" fill="#2a1f14" stroke="#d97706" stroke-width="1"/>
  <text x="50" y="268" font-family="monospace" font-size="13" fill="#fbbf24" font-weight="bold">My Reservations</text>
  <line x1="50" y1="278" x2="750" y2="278" stroke="#44403c" stroke-width="1"/>
  <!-- Table header -->
  <text x="50" y="298" font-family="monospace" font-size="9" fill="#92400e">TITLE</text>
  <text x="280" y="298" font-family="monospace" font-size="9" fill="#92400e">DUE DATE</text>
  <text x="430" y="298" font-family="monospace" font-size="9" fill="#92400e">STATUS</text>
  <text x="580" y="298" font-family="monospace" font-size="9" fill="#92400e">ACTION</text>
  <!-- Row 1 -->
  <text x="50" y="320" font-family="monospace" font-size="10" fill="#fde68a">Brave New World</text>
  <text x="280" y="320" font-family="monospace" font-size="10" fill="#d6d3d1">Apr 12, 2026</text>
  <rect x="430" y="308" width="70" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="438" y="321" font-family="monospace" font-size="9" fill="#22c55e">On Time</text>
  <rect x="580" y="306" width="70" height="20" rx="4" fill="#44403c"/>
  <text x="591" y="320" font-family="monospace" font-size="9" fill="#d6d3d1">Renew</text>
  <!-- Row 2 -->
  <text x="50" y="348" font-family="monospace" font-size="10" fill="#fde68a">Dune</text>
  <text x="280" y="348" font-family="monospace" font-size="10" fill="#d6d3d1">Mar 28, 2026</text>
  <rect x="430" y="336" width="70" height="18" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="438" y="349" font-family="monospace" font-size="9" fill="#ef4444">Overdue</text>
  <rect x="580" y="334" width="70" height="20" rx="4" fill="#b45309"/>
  <text x="587" y="348" font-family="monospace" font-size="9" fill="white">Return</text>
</svg>
