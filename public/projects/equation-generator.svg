<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none">
  <rect width="800" height="400" rx="16" fill="#0a0a1e"/>
  <!-- Title area -->
  <text x="250" y="45" font-family="monospace" font-size="18" fill="#818cf8" font-weight="bold">Math Equation Generator</text>
  <line x1="60" y1="60" x2="740" y2="60" stroke="#2e2e5e" stroke-width="1"/>
  <!-- Difficulty selector -->
  <rect x="60" y="75" width="100" height="30" rx="6" fill="#4f46e5"/>
  <text x="82" y="95" font-family="monospace" font-size="11" fill="white">Easy</text>
  <rect x="170" y="75" width="100" height="30" rx="6" fill="#1e1e4a" stroke="#4f46e5" stroke-width="1"/>
  <text x="188" y="95" font-family="monospace" font-size="11" fill="#818cf8">Medium</text>
  <rect x="280" y="75" width="100" height="30" rx="6" fill="#1e1e4a" stroke="#4f46e5" stroke-width="1"/>
  <text x="305" y="95" font-family="monospace" font-size="11" fill="#818cf8">Hard</text>
  <!-- Generated equations -->
  <rect x="60" y="120" width="680" height="60" rx="10" fill="#1e1e3a" stroke="#4338ca" stroke-width="1"/>
  <text x="85" y="147" font-family="monospace" font-size="10" fill="#6366f1">Q1.</text>
  <text x="120" y="147" font-family="monospace" font-size="22" fill="#c7d2fe">12  x  7  =  ?</text>
  <text x="600" y="147" font-family="monospace" font-size="11" fill="#22c55e">Answer: 84</text>
  <rect x="655" y="133" width="60" height="24" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="665" y="150" font-family="monospace" font-size="10" fill="#22c55e">Correct</text>

  <rect x="60" y="192" width="680" height="60" rx="10" fill="#1e1e3a" stroke="#4338ca" stroke-width="1"/>
  <text x="85" y="219" font-family="monospace" font-size="10" fill="#6366f1">Q2.</text>
  <text x="120" y="219" font-family="monospace" font-size="22" fill="#c7d2fe">45  +  28  =  ?</text>
  <text x="600" y="219" font-family="monospace" font-size="11" fill="#22c55e">Answer: 73</text>
  <rect x="655" y="205" width="60" height="24" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="665" y="222" font-family="monospace" font-size="10" fill="#22c55e">Correct</text>

  <rect x="60" y="264" width="680" height="60" rx="10" fill="#1e1e3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="85" y="291" font-family="monospace" font-size="10" fill="#6366f1">Q3.</text>
  <text x="120" y="291" font-family="monospace" font-size="22" fill="#e0e7ff">96  -  34  =  ?</text>
  <rect x="580" y="278" width="140" height="28" rx="6" fill="#0f0f2a" stroke="#4338ca" stroke-width="1"/>
  <text x="595" y="297" font-family="monospace" font-size="11" fill="#6b7280">Type answer...</text>

  <!-- Bottom controls -->
  <rect x="60" y="340" width="160" height="38" rx="8" fill="#4f46e5"/>
  <text x="82" y="364" font-family="monospace" font-size="12" fill="white">Generate New</text>
  <rect x="240" y="340" width="120" height="38" rx="8" fill="#1e1e4a" stroke="#4f46e5" stroke-width="1"/>
  <text x="265" y="364" font-family="monospace" font-size="12" fill="#818cf8">Reset</text>
  <!-- Score -->
  <rect x="580" y="340" width="160" height="38" rx="8" fill="#1e1e3a"/>
  <text x="600" y="364" font-family="monospace" font-size="12" fill="#a5b4fc">Score: 2 / 3</text>
</svg>
